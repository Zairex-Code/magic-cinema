plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.zairex'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	
	//LangChain4j
	// El Motor (Versión para Spring Boot 4)
	implementation 'dev.langchain4j:langchain4j-open-ai-spring-boot4-starter:1.14.1-beta24'

	// El Volante (Versión para Spring Boot 4)
	implementation 'dev.langchain4j:langchain4j-spring-boot4-starter:1.14.1-beta24'
}

tasks.named('test') {
	useJUnitPlatform()
}
